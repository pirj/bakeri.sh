# Reference GitHub Actions workflow for projects using bakeri.sh.
#
# Copy-paste this into <your-project>/.github/workflows/ci.yml and
# adapt the matrix / commands. Lives in docs/ (not .github/workflows/)
# because it's reference material — bakeri.sh's own repo doesn't run
# it as CI.
#
# Two forms below: the recommended packaged-action form first, then
# the expanded inline form for projects that want to see every step
# or can't use the packaged action.

# ─────────────────────────────────────────────────────────────────────
# Form 1 — packaged action (recommended)
# ─────────────────────────────────────────────────────────────────────
# pirj/setup-bakerish bundles the host-prereqs install (qemu, ovmf,
# tio source-build, etc.), the aq/rlock/bakeri.sh install, and the
# layer-cache restore+save into one composite step. It is the path
# that's validated end-to-end on ubuntu-latest; the inline form
# below is mostly useful for understanding what setup-bakerish does
# under the hood.

name: ci

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    # If your test suite shards, add a matrix here — each shard becomes
    # its own GH runner = its own VM, but shares the layer cache.
    # strategy:
    #   matrix:
    #     shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4

      - uses: pirj/setup-bakerish@v2

      # `bake run` is idempotent: provisions the VM on first call
      # (using cache layers wherever snapshot_key matches), reuses on
      # subsequent calls. Exit code of the inner command propagates.
      #
      # The first run on a fresh cache pays cold-build wall-clock
      # (~250 s on the rails-pg-sample fixture). Every subsequent run
      # on the same cache key is warm (~2.7 s for the chain restore
      # + the test command's own runtime).
      - name: Run tests
        run: bake run -- bundle exec rspec
        # If you split work into multiple `bake run` calls, they
        # reuse the same VM by default. Add --vm-suffix=<tag> to fan
        # out across independent VMs within the same job, e.g.
        #   bake run --vm-suffix=lint -- rubocop &
        #   bake run --vm-suffix=test -- rspec  &
        #   wait
        # Each suffixed VM has its own state and cache slot.

# ─────────────────────────────────────────────────────────────────────
