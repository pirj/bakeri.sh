description = "One-shot job runner: provision (or reuse) the project VM and exec a command in /repo"
protocol_version = "1"
deps = []
host_deps = []
# No triggers — this is a command-only plugin. The rlock framework's
# dispatch_command falls back to all discoverable plugins when looking
# for a command, so `rl snapc-run` works without snapc-run needing to
# appear in ACTIVE_PLUGINS via a file trigger.
triggers = []
commands = ["snapc-run"]
