description = "Install Python packages declared in poetry.lock via poetry install"
protocol_version = "1"
needs_source = true
deps = ["mise"]
host_deps = []
triggers = ["poetry.lock"]
commands = []

[snapshot]
# incremental: poetry's project-local .venv from the previous layer
# survives across builds, so `poetry install` only fetches / links the
# delta when the lockfile changes.
strategy = "incremental"
kind = "cold"
