# Reference GitHub Actions workflow for projects using bakeri.sh.
#
# Copy-paste this into <your-project>/.github/workflows/ci.yml and
# adapt the matrix / commands. The cache choreography is the part you
# almost never want to change — it's what makes the second-and-later
# CI runs sub-second-warm against the layered snapshot cache.
#
# This file lives in the bakeri.sh repo as documentation; bakeri.sh
# itself doesn't currently have a CI workflow of its own using it.

name: example-bakerish-ci

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    # If your test suite shards, add a matrix here — each shard becomes
    # its own GH runner = its own VM, but shares the layer cache.
    # strategy:
    #   matrix:
    #     shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4

      # Host prereqs. qemu provides the hypervisor; zstd is used by aq
      # to compress live snapshots. KVM is already enabled on
      # ubuntu-latest runners since 2023; no extra setup needed.
      - name: Install qemu + zstd
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends qemu-system-x86 zstd

      # aq, rlock, bakeri.sh are all shell scripts — just clone + put
      # on PATH. Pin to a release tag for reproducibility once you're
      # past the early-adoption phase.
      - name: Install aq / rlock / bakeri.sh
        run: |
          git clone --depth=1 https://github.com/pirj/aq        "$HOME/aq"
          git clone --depth=1 https://github.com/pirj/rlock     "$HOME/rlock"
          git clone --depth=1 https://github.com/pirj/bakeri.sh "$HOME/bakeri.sh"
          {
            echo "$HOME/aq"
            echo "$HOME/rlock/bin"
            echo "$HOME/bakeri.sh/bin"
          } >> "$GITHUB_PATH"
          echo "RLOCK_PLUGIN_PATH=$HOME/bakeri.sh/plugins" >> "$GITHUB_ENV"

      # Cache the layer store. The key derives from every file that
      # influences a snapshot_key: bakerish.toml + the union of common
      # lockfiles + key_files commonly declared in [prebuild.*] sections.
      # Cache miss = rebuild from scratch; partial restore via
      # restore-keys = some layers reused, others rebuilt. The framework
      # checks each layer's snapshot_key independently — partial-restore
      # is safe.
      #
      # Tune the hashFiles globs for your project. For a typical web
      # app, the defaults below are the right starting point.
      - name: Restore bakeri.sh layer cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.local/share/aq/cache
            ~/.local/share/aq/x86_64
          key: |
            bakeri-${{ runner.os }}-${{ hashFiles(
              'bakerish.toml',
              '**/Gemfile.lock',
              '**/package-lock.json',
              '**/pnpm-lock.yaml',
              '**/uv.lock',
              '**/poetry.lock',
              '**/Cargo.lock',
              'db/schema.rb',
              'db/migrate/**',
              'Dockerfile',
              'docker-compose.*'
            ) }}
          restore-keys: |
            bakeri-${{ runner.os }}-

      # `bake run` is idempotent: provisions the VM on first call
      # (using cache layers wherever snapshot_key matches), reuses on
      # subsequent calls. Exit code of the inner command propagates.
      #
      # The first run on a fresh cache pays cold-build wall-clock
      # (~250 s on the round-5 rails-pg-sample fixture). Every
      # subsequent run on the same cache key is warm (~2.7 s for the
      # chain restore + the test command's own runtime).
      - name: Run tests
        run: bake run -- bundle exec rspec
        # If you split work into multiple `bake run` calls, they
        # reuse the same VM by default. Add --vm-suffix=<tag> to fan
        # out across independent VMs within the same job, e.g.
        #   bake run --vm-suffix=lint -- rubocop &
        #   bake run --vm-suffix=test -- rspec  &
        #   wait
        # Each suffixed VM has its own state and cache slot.

      # Save the layer cache. Always-save semantic (`if: always()`)
      # lets you cache partial progress even when tests fail — the
      # next CI run benefits from whatever cache layers were built
      # before the failure.
      - name: Save bakeri.sh layer cache
        if: always() && steps.cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.local/share/aq/cache
            ~/.local/share/aq/x86_64
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}
